<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 460px;
  min-height: 300px;
  max-height: 580px;
  overflow-y: auto;
  background: linear-gradient(135deg, #0f1923 0%, #1a1a2e 50%, #16213e 100%);
  color: #e0e0e0;
  font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
  font-size: 12px;
  line-height: 1.5;
  padding: 12px;
}
a { color: #60a5fa; text-decoration: none; }
a:hover { text-decoration: underline; }

.btn {
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  color: #e0e0e0;
  font-size: 11px;
  font-family: inherit;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn-primary { background: rgba(96,165,250,0.2); border-color: rgba(96,165,250,0.4); color: #fff; }
.btn-primary:hover { background: rgba(96,165,250,0.35); border-color: rgba(96,165,250,0.6); }

.hint { color: rgba(255,255,255,0.4); font-size: 11px; margin-bottom: 8px; }
.error { color: #f87171; font-size: 11px; margin-top: 4px; }
.status { color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 4px; }
.hidden { display: none; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
th {
  text-align: left; padding: 5px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.04em;
  cursor: pointer; user-select: none;
}
th:hover { color: rgba(255,255,255,0.6); }
th.sorted-asc::after { content: ' ^'; color: #60a5fa; }
th.sorted-desc::after { content: ' v'; color: #60a5fa; }
td { padding: 5px 6px; border-bottom: 1px solid rgba(255,255,255,0.04); }
tr:hover td { background: rgba(255,255,255,0.04); }
td.price { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
td.sales { font-family: 'JetBrains Mono', monospace; font-size: 11px; }
td.loc { color: rgba(255,255,255,0.35); }
td.no { color: rgba(255,255,255,0.2); font-family: 'JetBrains Mono', monospace; font-size: 10px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.header-title { font-size: 13px; font-weight: 700; color: #fff; }
.header-link { font-size: 11px; color: #60a5fa; cursor: pointer; }

/* Product info */
.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 8px; }
.info-box {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 6px 8px;
}
.info-label { color: rgba(255,255,255,0.3); font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
.info-value { font-size: 13px; font-weight: 700; color: #fff; }

/* Theme bars */
.theme-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
.theme-name { width: 80px; color: rgba(255,255,255,0.4); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }
.theme-track { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.theme-fill { height: 100%; border-radius: 2px; }
.theme-count { width: 20px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.3); }

/* Insights */
.insight {
  font-size: 11px;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.06);
  border-left: 2px solid rgba(96,165,250,0.5);
  padding: 4px 8px; margin-bottom: 3px;
  border-radius: 0 6px 6px 0;
  color: rgba(255,255,255,0.6);
}

.section { margin-top: 10px; }
.section-title { color: rgba(255,255,255,0.3); font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; font-weight: 600; }
</style>
</head>
<body>

<!-- IDLE -->
<div id="idle">
  <div class="hint">Buka halaman produk atau pencarian Shopee/Tokopedia, lalu klik Scrape.</div>
  <div style="display:flex;gap:4px">
    <button id="scrapeBtn" class="btn btn-primary">Scrape</button>
    <button id="debugBtn" class="btn">Debug</button>
  </div>
  <div id="status" class="status hidden"></div>
  <div id="error" class="error hidden"></div>
</div>

<!-- SEARCH RESULTS -->
<div id="searchResults" class="hidden">
  <div class="header">
    <div>
      <div id="searchQuery" class="header-title"></div>
      <div id="searchCount" style="color:rgba(255,255,255,0.35);font-size:11px"></div>
    </div>
    <span class="header-link" onclick="resetUI()">Baru</span>
  </div>
  <table>
    <thead>
      <tr>
        <th class="no" data-sort="no">No</th>
        <th data-sort="name">Produk</th>
        <th data-sort="price">Harga</th>
        <th data-sort="sales">Terjual</th>
        <th data-sort="location">Lokasi</th>
      </tr>
    </thead>
    <tbody id="searchTable"></tbody>
  </table>
</div>

<!-- PRODUCT DETAIL -->
<div id="productResults" class="hidden">
  <div class="header">
    <div class="header-title">Detail Produk</div>
    <span class="header-link" onclick="resetUI()">Baru</span>
  </div>

  <div id="prodName" style="font-size:12px;font-weight:700;color:#fff;margin-bottom:8px"></div>

  <div class="info-grid">
    <div class="info-box"><div class="info-label">Harga</div><div class="info-value" id="prodPrice">-</div></div>
    <div class="info-box"><div class="info-label">Rating</div><div class="info-value" id="prodRating">-</div></div>
    <div class="info-box"><div class="info-label">Terjual</div><div class="info-value" id="prodSales">-</div></div>
    <div class="info-box"><div class="info-label">Toko</div><div class="info-value" id="prodShop">-</div></div>
    <div class="info-box"><div class="info-label">Lokasi</div><div class="info-value" id="prodLocation">-</div></div>
    <div class="info-box"><div class="info-label">Stok</div><div class="info-value" id="prodAvailability">-</div></div>
  </div>

  <div class="info-grid" style="grid-template-columns:1fr 1fr">
    <div class="info-box"><div class="info-label">Review</div><div class="info-value" id="prodReviewCount">-</div></div>
    <div class="info-box"><div class="info-label">Sentimen</div><div class="info-value" id="prodSentiment">-</div></div>
  </div>

  <div class="section">
    <div class="section-title">Tema</div>
    <div id="prodThemes"></div>
  </div>

  <div class="section">
    <div class="section-title">Insight</div>
    <div id="prodInsights"></div>
  </div>

  <div style="margin-top:10px;display:flex;gap:6px;align-items:center">
    <button id="saveBtn" class="btn" onclick="saveToSupabase()">Simpan</button>
    <span id="saveStatus" class="hidden" style="color:rgba(255,255,255,0.35);font-size:11px"></span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
