<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 480px;
  min-height: 400px;
  max-height: 600px;
  overflow-y: auto;
  background: #0b1326;
  color: #dae2fd;
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  padding: 16px;
}
a { color: #adc6ff; }
.label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #8c909f; margin-bottom: 6px; }
.btn {
  width: 100%; padding: 8px 0; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: #4d8eff; color: #00285d; }
.btn-save { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
.btn-text { background: none; color: #adc6ff; border: none; font-size: 12px; width: auto; padding: 4px 0; text-decoration: underline; }
.hint { font-size: 12px; color: #8c909f; margin-bottom: 12px; }
.status { font-size: 11px; color: #8c909f; margin-top: 8px; word-break: break-all; }
.error { font-size: 11px; color: #ffb4ab; margin-top: 8px; }
.hidden { display: none; }
.green { color: #22c55e; }
.yellow { color: #eab308; }
.red { color: #ef4444; }
.section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #8c909f; margin-bottom: 6px; margin-top: 14px; }

/* Product info grid */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.info-item { background: #131b2e; border: 1px solid #424754; border-radius: 6px; padding: 8px; }
.info-label { font-size: 10px; color: #8c909f; text-transform: uppercase; }
.info-value { font-size: 13px; font-weight: 600; margin-top: 2px; }

/* Search results table */
.search-table { width: 100%; font-size: 11px; border-collapse: collapse; margin-top: 8px; }
.search-table th {
  text-align: left; padding: 5px 6px; border-bottom: 1px solid #424754;
  color: #8c909f; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; font-size: 9px;
}
.search-table td { padding: 5px 6px; border-bottom: 1px solid #1a2236; vertical-align: top; }
.search-table tr:hover td { background: #131b2e; }

/* Theme bars */
.theme-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 12px; }
.theme-name { width: 100px; color: #8c909f; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.theme-track { flex: 1; height: 6px; background: #2d3449; border-radius: 3px; overflow: hidden; }
.theme-fill { height: 100%; border-radius: 3px; }
.theme-count { width: 24px; text-align: right; font-family: monospace; font-size: 11px; color: #8c909f; }
.insight-list { list-style: none; }
.insight-item { font-size: 12px; background: #131b2e; border-left: 2px solid #4d8eff; padding: 6px 10px; border-radius: 0 4px 4px 0; margin-bottom: 4px; }
</style>
</head>
<body>

<!-- IDLE STATE -->
<div id="idle">
  <div class="hint">Buka halaman produk atau hasil pencarian Shopee/Tokopedia, lalu klik Scrape.</div>
  <button id="scrapeBtn" class="btn btn-primary">Scrape</button>
  <button id="debugBtn" class="btn btn-save" style="margin-top:6px;font-size:11px;padding:6px 0">Debug Page</button>
  <div id="status" class="status hidden"></div>
  <div id="error" class="error hidden"></div>
</div>

<!-- SEARCH RESULTS -->
<div id="searchResults" class="hidden">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div>
      <div id="searchQuery" class="label" style="margin:0"></div>
      <div id="searchCount" style="font-size:12px;color:#8c909f"></div>
    </div>
    <button onclick="resetUI()" class="btn-text">Baru</button>
  </div>
  <div style="overflow-x:auto">
    <table class="search-table">
      <thead>
        <tr><th>No</th><th>Produk</th><th>Harga</th><th>Terjual</th><th>Lokasi</th></tr>
      </thead>
      <tbody id="searchTable"></tbody>
    </table>
  </div>
</div>

<!-- PRODUCT DETAIL RESULTS -->
<div id="productResults" class="hidden">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div class="label" style="margin:0">Detail Produk</div>
    <button onclick="resetUI()" class="btn-text">Baru</button>
  </div>

  <div id="prodName" style="font-size:14px;font-weight:600;margin-bottom:10px"></div>

  <div class="info-grid">
    <div class="info-item"><div class="info-label">Harga</div><div class="info-value" id="prodPrice">-</div></div>
    <div class="info-item"><div class="info-label">Rating</div><div class="info-value" id="prodRating">-</div></div>
    <div class="info-item"><div class="info-label">Terjual</div><div class="info-value" id="prodSales">-</div></div>
    <div class="info-item"><div class="info-label">Stok</div><div class="info-value" id="prodAvailability">-</div></div>
    <div class="info-item"><div class="info-label">Toko</div><div class="info-value" id="prodShop">-</div></div>
    <div class="info-item"><div class="info-label">Lokasi</div><div class="info-value" id="prodLocation">-</div></div>
  </div>

  <div class="info-grid" style="grid-template-columns:1fr 1fr 1fr">
    <div class="info-item"><div class="info-label">Review</div><div class="info-value" id="prodReviewCount">-</div></div>
    <div class="info-item"><div class="info-label">Sentimen</div><div class="info-value" id="prodSentiment">-</div></div>
    <div class="info-item"><div class="info-label">Skor</div><div class="info-value" id="prodScore">-</div></div>
  </div>

  <div class="section-title">Tema Review</div>
  <div id="prodThemes"></div>

  <div class="section-title">Insight</div>
  <ul class="insight-list" id="prodInsights"></ul>

  <div style="margin-top:14px">
    <button id="saveBtn" class="btn btn-save" onclick="saveToSupabase()">Simpan ke Database</button>
    <div id="saveStatus" class="hidden" style="font-size:11px;color:#8c909f;text-align:center;margin-top:6px"></div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
