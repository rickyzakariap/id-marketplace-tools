<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 480px;
  min-height: 320px;
  max-height: 600px;
  overflow-y: auto;
  background: #0e1117;
  color: #c9d1d9;
  font-family: 'Plus Jakarta Sans', 'Segoe UI', system-ui, sans-serif;
  font-size: 12px;
  line-height: 1.5;
  padding: 14px;
}

a { color: #58a6ff; text-decoration: none; }
a:hover { text-decoration: underline; }

/* Glass panel — clear transparent glass */
.glass {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-top-color: rgba(255,255,255,0.16);
  border-radius: 12px;
  box-shadow: 0 1px 0 0 rgba(255,255,255,0.06) inset, 0 0 0 0 transparent;
}

.btn {
  padding: 7px 16px;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  color: #c9d1d9;
  font-size: 11px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s ease;
}
.btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.18); }
.btn:active { background: rgba(255,255,255,0.06); }
.btn:disabled { opacity: 0.2; cursor: default; }
.btn-primary {
  background: rgba(46,160,67,0.15);
  border-color: rgba(46,160,67,0.35);
  color: #3fb950;
}
.btn-primary:hover {
  background: rgba(46,160,67,0.25);
  border-color: rgba(46,160,67,0.5);
}
.btn-sm { padding: 4px 10px; font-size: 10px; }

.hint { color: rgba(255,255,255,0.25); font-size: 11px; margin-bottom: 10px; }
.error { color: #f85149; font-size: 11px; margin-top: 6px; }
.status { color: rgba(255,255,255,0.25); font-size: 11px; margin-top: 6px; }
.hidden { display: none; }

/* Idle state */
.idle-card { padding: 24px; text-align: center; }
.idle-icon {
  width: 52px; height: 52px;
  margin: 0 auto 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-top-color: rgba(255,255,255,0.12);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.idle-title { font-size: 15px; font-weight: 700; color: #e6edf3; margin-bottom: 4px; }
.idle-sub { font-size: 11px; color: rgba(255,255,255,0.25); margin-bottom: 16px; }
.idle-actions { display: flex; gap: 6px; justify-content: center; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 11px; }
th {
  text-align: left; padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.25); font-size: 9px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.06em;
  cursor: pointer; user-select: none;
}
th:hover { color: rgba(255,255,255,0.5); }
th.sorted-asc::after { content: ' ^'; color: #58a6ff; }
th.sorted-desc::after { content: ' v'; color: #58a6ff; }
td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.025); }
tr { transition: background 0.12s; }
tr:hover td { background: rgba(255,255,255,0.03); }
td.price { font-family: 'JetBrains Mono', monospace; color: #3fb950; }
td.sales { font-family: 'JetBrains Mono', monospace; }
td.loc { color: rgba(255,255,255,0.25); font-size: 10px; }
td.no { color: rgba(255,255,255,0.12); font-family: 'JetBrains Mono', monospace; font-size: 10px; }
td a { font-weight: 500; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.header-title { font-size: 14px; font-weight: 700; color: #e6edf3; }
.header-link { font-size: 11px; color: #58a6ff; cursor: pointer; font-weight: 500; }

/* Product info */
.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
.info-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-top-color: rgba(255,255,255,0.14);
  border-radius: 10px;
  padding: 8px 10px;
  transition: border-color 0.15s;
}
.info-box:hover { border-color: rgba(255,255,255,0.12); }
.info-label { color: rgba(255,255,255,0.2); font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
.info-value { font-size: 14px; font-weight: 700; color: #e6edf3; margin-top: 2px; }

/* Theme bars */
.theme-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.theme-name { width: 80px; color: rgba(255,255,255,0.3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; font-weight: 500; }
.theme-track { flex: 1; height: 4px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; }
.theme-fill { height: 100%; border-radius: 2px; }
.theme-count { width: 22px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 10px; color: rgba(255,255,255,0.2); }

/* Insights */
.insight {
  font-size: 11px;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.04);
  border-left: 2px solid rgba(46,160,67,0.4);
  padding: 6px 10px; margin-bottom: 4px;
  border-radius: 0 8px 8px 0;
  color: rgba(255,255,255,0.45);
}

.section { margin-top: 12px; }
.section-title { color: rgba(255,255,255,0.2); font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; font-weight: 700; }

/* Export bar */
.export-bar {
  display: flex; gap: 6px; align-items: center; margin-top: 10px;
  padding: 8px 10px;
}
.export-bar .btn { font-size: 10px; }
.export-status { font-size: 10px; color: rgba(255,255,255,0.25); margin-left: auto; }

/* Scrollbar */
body::-webkit-scrollbar { width: 4px; }
body::-webkit-scrollbar-track { background: transparent; }
body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
</style>
</head>
<body>

<!-- IDLE -->
<div id="idle" class="glass idle-card">
  <div class="idle-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      <path d="M11 8v6M8 11h6" stroke-opacity="0.4"/>
    </svg>
  </div>
  <div class="idle-title">Review Scraper</div>
  <div class="idle-sub">Scrape review Shopee & Tokopedia</div>
  <div class="hint">Buka halaman produk atau pencarian, lalu klik Scrape.</div>
  <div class="idle-actions">
    <button id="scrapeBtn" class="btn btn-primary">Scrape</button>
    <button id="debugBtn" class="btn">Debug</button>
  </div>
  <div id="status" class="status hidden"></div>
  <div id="error" class="error hidden"></div>
</div>

<!-- SEARCH RESULTS -->
<div id="searchResults" class="hidden">
  <div class="header">
    <div>
      <div id="searchQuery" class="header-title"></div>
      <div id="searchCount" style="color:rgba(255,255,255,0.25);font-size:11px;margin-top:2px"></div>
    </div>
    <span class="header-link" onclick="resetUI()">Baru</span>
  </div>
  <div class="glass" style="padding:4px">
    <table>
      <thead>
        <tr>
          <th class="no" data-sort="no">#</th>
          <th data-sort="name">Produk</th>
          <th data-sort="price">Harga</th>
          <th data-sort="sales">Terjual</th>
          <th data-sort="location">Lokasi</th>
        </tr>
      </thead>
      <tbody id="searchTable"></tbody>
    </table>
  </div>
  <div class="export-bar glass">
    <button class="btn btn-sm" onclick="exportCSV()">CSV</button>
    <button class="btn btn-sm" onclick="exportSheets()">Sheets</button>
    <button class="btn btn-sm" id="saveSearchBtn" onclick="saveToSupabase()">Supabase</button>
    <span id="exportStatus" class="export-status hidden"></span>
  </div>
</div>

<!-- PRODUCT DETAIL -->
<div id="productResults" class="hidden">
  <div class="header">
    <div class="header-title">Detail Produk</div>
    <span class="header-link" onclick="resetUI()">Baru</span>
  </div>

  <div id="prodName" style="font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:10px;line-height:1.4"></div>

  <div class="info-grid">
    <div class="info-box"><div class="info-label">Harga</div><div class="info-value" id="prodPrice">-</div></div>
    <div class="info-box"><div class="info-label">Rating</div><div class="info-value" id="prodRating">-</div></div>
    <div class="info-box"><div class="info-label">Terjual</div><div class="info-value" id="prodSales">-</div></div>
    <div class="info-box"><div class="info-label">Toko</div><div class="info-value" id="prodShop">-</div></div>
    <div class="info-box"><div class="info-label">Lokasi</div><div class="info-value" id="prodLocation">-</div></div>
    <div class="info-box"><div class="info-label">Stok</div><div class="info-value" id="prodAvailability">-</div></div>
  </div>

  <div class="info-grid" style="grid-template-columns:1fr 1fr">
    <div class="info-box"><div class="info-label">Review</div><div class="info-value" id="prodReviewCount">-</div></div>
    <div class="info-box"><div class="info-label">Sentimen</div><div class="info-value" id="prodSentiment">-</div></div>
  </div>

  <div class="section">
    <div class="section-title">Tema</div>
    <div id="prodThemes"></div>
  </div>

  <div class="section">
    <div class="section-title">Insight</div>
    <div id="prodInsights"></div>
  </div>

  <div class="export-bar glass">
    <button class="btn btn-sm" onclick="exportCSV()">CSV</button>
    <button class="btn btn-sm" onclick="exportSheets()">Sheets</button>
    <button class="btn btn-sm" id="saveProductBtn" onclick="saveToSupabase()">Supabase</button>
    <span id="exportStatus2" class="export-status hidden"></span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
