<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 460px;
  min-height: 300px;
  max-height: 580px;
  overflow-y: auto;
  background: #141414;
  color: #b8b8b8;
  font-family: 'DM Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
  font-size: 12px;
  line-height: 1.5;
  padding: 12px;
}
a { color: #2dd4a8; text-decoration: none; }
a:hover { text-decoration: underline; }

.btn {
  padding: 6px 14px;
  border: 1px solid #2a2a2a;
  border-radius: 4px;
  background: #1e1e1e;
  color: #b8b8b8;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.btn:hover { background: #252525; border-color: #3a3a3a; }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn-primary { background: #0d3d2e; border-color: #1a6b50; color: #e0e0e0; }
.btn-primary:hover { background: #1a6b50; border-color: #2dd4a8; }

.hint { color: #666; font-size: 11px; margin-bottom: 8px; }
.error { color: #e55; font-size: 11px; margin-top: 4px; }
.status { color: #666; font-size: 11px; margin-top: 4px; }
.hidden { display: none; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
th {
  text-align: left; padding: 4px 6px; border-bottom: 1px solid #222;
  color: #666; font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.03em; cursor: pointer; user-select: none;
}
th:hover { color: #999; }
th.sorted-asc::after { content: ' ^'; color: #2dd4a8; }
th.sorted-desc::after { content: ' v'; color: #2dd4a8; }
td { padding: 4px 6px; border-bottom: 1px solid #1a1a1a; }
tr:hover td { background: #1a1a1a; }
td.price { font-family: 'Cascadia Code', 'Fira Code', 'SF Mono', monospace; font-size: 11px; }
td.sales { font-family: 'Cascadia Code', 'Fira Code', 'SF Mono', monospace; font-size: 11px; }
td.loc { color: #666; }
td.no { color: #444; font-family: monospace; font-size: 10px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.header-title { font-size: 13px; font-weight: 600; color: #e0e0e0; }
.header-link { font-size: 11px; color: #2dd4a8; cursor: pointer; }

/* Product info */
.info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 8px; }
.info-box { background: #1a1a1a; border: 1px solid #222; border-radius: 4px; padding: 6px 8px; }
.info-label { color: #555; font-size: 9px; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 500; }
.info-value { font-size: 13px; font-weight: 600; color: #e0e0e0; }

/* Theme bars */
.theme-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
.theme-name { width: 80px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }
.theme-track { flex: 1; height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
.theme-fill { height: 100%; border-radius: 2px; }
.theme-count { width: 20px; text-align: right; font-family: monospace; font-size: 10px; color: #555; }

/* Insights */
.insight {
  font-size: 11px; background: #1a1a1a; border-left: 2px solid #1a6b50;
  padding: 4px 8px; margin-bottom: 3px; border-radius: 0 3px 3px 0; color: #999;
}

.section { margin-top: 10px; }
.section-title { color: #555; font-size: 9px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; font-weight: 500; }
</style>
</head>
<body>

<!-- IDLE -->
<div id="idle">
  <div class="hint">Buka halaman produk atau pencarian Shopee/Tokopedia, lalu klik Scrape.</div>
  <div style="display:flex;gap:4px">
    <button id="scrapeBtn" class="btn btn-primary">Scrape</button>
    <button id="debugBtn" class="btn">Debug</button>
  </div>
  <div id="status" class="status hidden"></div>
  <div id="error" class="error hidden"></div>
</div>

<!-- SEARCH RESULTS -->
<div id="searchResults" class="hidden">
  <div class="header">
    <div>
      <div id="searchQuery" class="header-title"></div>
      <div id="searchCount" style="color:#555;font-size:11px"></div>
    </div>
    <span class="header-link" onclick="resetUI()">Baru</span>
  </div>
  <table>
    <thead>
      <tr>
        <th class="no" data-sort="no">No</th>
        <th data-sort="name">Produk</th>
        <th data-sort="price">Harga</th>
        <th data-sort="sales">Terjual</th>
        <th data-sort="location">Lokasi</th>
      </tr>
    </thead>
    <tbody id="searchTable"></tbody>
  </table>
</div>

<!-- PRODUCT DETAIL -->
<div id="productResults" class="hidden">
  <div class="header">
    <div class="header-title">Detail Produk</div>
    <span class="header-link" onclick="resetUI()">Baru</span>
  </div>

  <div id="prodName" style="font-size:12px;font-weight:600;color:#e0e0e0;margin-bottom:8px"></div>

  <div class="info-grid">
    <div class="info-box"><div class="info-label">Harga</div><div class="info-value" id="prodPrice">-</div></div>
    <div class="info-box"><div class="info-label">Rating</div><div class="info-value" id="prodRating">-</div></div>
    <div class="info-box"><div class="info-label">Terjual</div><div class="info-value" id="prodSales">-</div></div>
    <div class="info-box"><div class="info-label">Toko</div><div class="info-value" id="prodShop">-</div></div>
    <div class="info-box"><div class="info-label">Lokasi</div><div class="info-value" id="prodLocation">-</div></div>
    <div class="info-box"><div class="info-label">Stok</div><div class="info-value" id="prodAvailability">-</div></div>
  </div>

  <div class="info-grid" style="grid-template-columns:1fr 1fr">
    <div class="info-box"><div class="info-label">Review</div><div class="info-value" id="prodReviewCount">-</div></div>
    <div class="info-box"><div class="info-label">Sentimen</div><div class="info-value" id="prodSentiment">-</div></div>
  </div>

  <div class="section">
    <div class="section-title">Tema</div>
    <div id="prodThemes"></div>
  </div>

  <div class="section">
    <div class="section-title">Insight</div>
    <div id="prodInsights"></div>
  </div>

  <div style="margin-top:10px;display:flex;gap:6px;align-items:center">
    <button id="saveBtn" class="btn" onclick="saveToSupabase()">Simpan</button>
    <span id="saveStatus" class="hidden" style="color:#555;font-size:11px"></span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
