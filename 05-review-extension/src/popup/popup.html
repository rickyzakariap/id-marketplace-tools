<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 440px;
  min-height: 300px;
  max-height: 580px;
  overflow-y: auto;
  background: #111;
  color: #ddd;
  font-family: -apple-system, system-ui, sans-serif;
  font-size: 12px;
  line-height: 1.5;
  padding: 12px;
}
a { color: #8ab4f8; text-decoration: none; }
a:hover { text-decoration: underline; }

.btn {
  display: inline-block;
  padding: 6px 14px;
  border: 1px solid #333;
  border-radius: 4px;
  background: #222;
  color: #ddd;
  font-size: 12px;
  cursor: pointer;
}
.btn:hover { background: #333; }
.btn:disabled { opacity: 0.3; cursor: default; }
.btn-primary { background: #264f78; border-color: #264f78; color: #fff; }
.btn-primary:hover { background: #1a3a5c; }

.hint { color: #666; font-size: 11px; margin-bottom: 8px; }
.error { color: #f44; font-size: 11px; margin-top: 6px; }
.status { color: #666; font-size: 11px; margin-top: 6px; }
.hidden { display: none; }
.label { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; }

/* Product info */
.info-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.info-item { flex: 1; min-width: 80px; }
.info-item .label { margin-bottom: 2px; }
.info-item .value { font-size: 13px; }

/* Table */
table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 6px; }
th { text-align: left; padding: 4px 6px; border-bottom: 1px solid #333; color: #666; font-size: 10px; font-weight: 600; text-transform: uppercase; }
td { padding: 4px 6px; border-bottom: 1px solid #1a1a1a; }
tr:hover td { background: #1a1a1a; }

/* Theme bars */
.theme-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 11px; }
.theme-name { width: 90px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.theme-track { flex: 1; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
.theme-fill { height: 100%; border-radius: 2px; }
.theme-count { width: 20px; text-align: right; font-family: monospace; font-size: 10px; color: #666; }

/* Insights */
.insight { font-size: 11px; background: #1a1a1a; border-left: 2px solid #264f78; padding: 4px 8px; margin-bottom: 3px; border-radius: 0 3px 3px 0; }

.section { margin-top: 12px; }
.section-title { color: #666; font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 4px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.header-title { font-size: 14px; font-weight: 600; }
.header-link { font-size: 11px; color: #8ab4f8; cursor: pointer; }
</style>
</head>
<body>

<!-- IDLE -->
<div id="idle">
  <div class="hint">Buka halaman produk atau hasil pencarian Shopee/Tokopedia, lalu klik Scrape.</div>
  <div style="display:flex;gap:6px">
    <button id="scrapeBtn" class="btn btn-primary">Scrape</button>
    <button id="debugBtn" class="btn">Debug</button>
  </div>
  <div id="status" class="status hidden"></div>
  <div id="error" class="error hidden"></div>
</div>

<!-- SEARCH RESULTS -->
<div id="searchResults" class="hidden">
  <div class="header">
    <div>
      <div id="searchQuery" class="header-title"></div>
      <div id="searchCount" style="color:#666;font-size:11px"></div>
    </div>
    <span class="header-link" onclick="resetUI()">Baru</span>
  </div>
  <table>
    <thead><tr><th>No</th><th>Produk</th><th>Harga</th><th>Terjual</th><th>Lokasi</th></tr></thead>
    <tbody id="searchTable"></tbody>
  </table>
</div>

<!-- PRODUCT DETAIL -->
<div id="productResults" class="hidden">
  <div class="header">
    <div class="header-title">Detail Produk</div>
    <span class="header-link" onclick="resetUI()">Baru</span>
  </div>

  <div id="prodName" style="font-size:13px;font-weight:600;margin-bottom:8px"></div>

  <div class="info-row">
    <div class="info-item"><div class="label">Harga</div><div class="value" id="prodPrice">-</div></div>
    <div class="info-item"><div class="label">Rating</div><div class="value" id="prodRating">-</div></div>
    <div class="info-item"><div class="label">Terjual</div><div class="value" id="prodSales">-</div></div>
  </div>
  <div class="info-row">
    <div class="info-item"><div class="label">Toko</div><div class="value" id="prodShop">-</div></div>
    <div class="info-item"><div class="label">Lokasi</div><div class="value" id="prodLocation">-</div></div>
    <div class="info-item"><div class="label">Stok</div><div class="value" id="prodAvailability">-</div></div>
  </div>

  <div class="info-row">
    <div class="info-item"><div class="label">Review</div><div class="value" id="prodReviewCount">-</div></div>
    <div class="info-item"><div class="label">Sentimen</div><div class="value" id="prodSentiment">-</div></div>
  </div>

  <div class="section">
    <div class="section-title">Tema</div>
    <div id="prodThemes"></div>
  </div>

  <div class="section">
    <div class="section-title">Insight</div>
    <div id="prodInsights"></div>
  </div>

  <div style="margin-top:10px">
    <button id="saveBtn" class="btn" onclick="saveToSupabase()">Simpan</button>
    <span id="saveStatus" class="hidden" style="margin-left:8px;color:#666;font-size:11px"></span>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
